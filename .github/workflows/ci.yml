name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  engine:
    name: dnd5e-engine
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: packages/dnd5e-engine
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      - run: uv sync --extra dev
      - run: make check
      - run: bash scripts/smoke_clean_install.sh

  srd-data:
    name: dnd5e-srd-data
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: packages/dnd5e-srd-data
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      - run: uv sync --extra dev
      - run: make check

  examples:
    name: examples
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      - run: uv sync --all-packages
      - run: uv run python examples/grid_combat.py
      - run: uv run python examples/skill_check.py
      - run: uv run python examples/build_party_member.py

  docs:
    name: docs
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      - run: uv sync --group docs
      - run: uv run --group docs mkdocs build --strict
